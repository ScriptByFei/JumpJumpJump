<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JumpJumpJump" />
    
    <!-- Theme -->
    <meta name="theme-color" content="#0a0a14" />
    <meta name="format-detection" content="telephone=no" />
    
    <title>JumpJumpJump — Arcade Platformer</title>
    <meta name="description" content="A fast, touch-first platformer built for sharp reflexes and short addictive runs." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f0f1a' width='100' height='100' rx='20'/><circle fill='%234ecdc4' cx='50' cy='50' r='30'/><circle fill='%23e94560' cx='50' cy='45' r='20'/></svg>" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-dark: #0a0a14;
        --bg-card: #12121f;
        --accent: #4ecdc4;
        --accent-glow: rgba(78, 205, 196, 0.15);
        --text-primary: #ffffff;
        --text-secondary: #9ba3b5;
        --text-muted: #6b7280;
        --danger: #e94560;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        min-height: 100%;
        background: var(--bg-dark);
        font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text-primary);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body {
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      
      .container {
        width: 100%;
        max-width: 390px;
        margin: 0 auto;
        padding: 0 24px;
      }
      
      /* ─── Hero ─── */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 24px;
        background: linear-gradient(180deg, var(--bg-dark) 0%, #0f0f1a 100%);
      }
      
      .hero-content {
        width: 100%;
        max-width: 320px;
      }
      
      .btn-primary {
        display: block;
        width: 100%;
        padding: 20px 32px;
        background: var(--accent);
        color: var(--bg-dark);
        font-family: 'Russo One', sans-serif;
        font-size: 20px;
        text-decoration: none;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      
      .btn-primary:hover {
        transform: scale(1.02);
      }
      
      .btn-primary:active {
        transform: scale(0.98);
      }
      
      /* ─── Game Container (hidden until game starts) ─── */
      #game-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-dark);
        z-index: 1000;
      }
      
      #game-container canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      
      .back-btn {
        position: fixed;
        top: calc(20px + var(--safe-top));
        left: 16px;
        width: 44px;
        height: 44px;
        background: rgba(255,255,255,0.1);
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 20px;
        cursor: pointer;
        z-index: 1001;
        display: none;
        backdrop-filter: blur(10px);
      }
    </style>
    <script type="module" crossorigin src="./assets/index-B9nY-Mpx.js"></script>
  <link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
  <body>
    <!-- Landing Page -->
    <main id="landing">
      <!-- Hero -->
      <section class="hero">
        <div class="container">
          <div class="hero-content">
            <button class="btn-primary" id="play-btn">Jetzt spielen</button>
          </div>
        </div>
      </section>
    </main>
    
    <!-- Game Container -->
    <div id="game-container"></div>
    <button class="back-btn" id="back-btn">←</button>
    
    <!-- Game Script -->
    <script>
      const playBtn = document.getElementById('play-btn');
      const landing = document.getElementById('landing');
      const gameContainer = document.getElementById('game-container');
      const backBtn = document.getElementById('back-btn');
      
      function startGame() {
        landing.style.display = 'none';
        gameContainer.style.display = 'block';
        backBtn.style.display = 'flex';
        window.dispatchEvent(new CustomEvent('startGame'));
      }
      
      function goBack() {
        landing.style.display = 'block';
        gameContainer.style.display = 'none';
        backBtn.style.display = 'none';
      }
      
      playBtn.addEventListener('click', startGame);
      backBtn.addEventListener('click', goBack);
    </script>
  </body>
</html>
