<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Mobile Viewport - Critical for mobile games -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JumpJumpJump" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="msapplication-navbutton-color" content="#0f0f1a" />
    
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Title & Description -->
    <title>JumpJumpJump</title>
    <meta name="description" content="A fun mobile vertical jumper game. Jump higher and higher!" />
    
    <!-- Favicon (inline SVG data URI) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f0f1a' width='100' height='100' rx='20'/><circle fill='%234ecdc4' cx='50' cy='50' r='30'/><circle fill='%23e94560' cx='50' cy='45' r='20'/></svg>" />

    <!-- Google Fonts: Russo One for titles, Exo 2 for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="./pwa-192x192.png" />
    
    <style>
      /* CSS Custom Properties for Safe Areas */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
        
        /* Fallback values for non-supported browsers */
        --fallback-sat: 44px;
        --fallback-sab: 34px;
      }
      
      /* Reset */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f0f1a;
        /* Prevent pull-to-refresh on mobile */
        overscroll-behavior: none;
        /* Smooth scrolling disabled for games */
        -webkit-overflow-scrolling: touch;
      }
      
      body {
        /* Safe area padding as fallback */
        padding-top: env(safe-area-inset-top, var(--fallback-sat));
        padding-bottom: env(safe-area-inset-bottom, var(--fallback-sab));
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      
      /* Game Container */
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Safe area aware */
        padding-top: var(--sat);
        padding-bottom: var(--sab);
        padding-left: var(--sal);
        padding-right: var(--sar);
      }
      
      /* Canvas styling */
      #game-container canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        /* Prevent blur on high DPI */
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }
      
      /* Prevent text selection and context menus */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Loading screen */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0f0f1a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-text {
        color: #4ecdc4;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 24px;
        font-weight: 700;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      /* Hide loading when Phaser is ready */
      .loaded #loading {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DQxgMSNj.js"></script>
  <link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
  <body>
    <!-- Loading indicator -->
    <div id="loading">
      <div class="loading-text">Loading...</div>
    </div>
    
    <!-- Game container -->
    <div id="game-container"></div>
    
    <!-- Phaser Game Script -->
    
    <!-- Hide loading screen when game is ready -->
    <script>
      window.addEventListener('load', () => {
        // Hide loading after a short delay (game will remove it when ready)
        setTimeout(() => {
          document.body.classList.add('loaded');
        }, 100);
      });
    </script>
  </body>
</html>
