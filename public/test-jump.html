<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>MINIMAL JUMP TEST</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; }
#c { display: block; margin: 0 auto; }
#log { position: fixed; top: 5px; left: 5px; color: #0f0; font: 10px monospace; background: rgba(0,0,0,0.8); padding: 4px; z-index: 999; white-space: pre; }
</style>
</head>
<body>
<div id="log"></div>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const GAME_W = 400, GAME_H = 700;
const log = document.getElementById('log');
function L(m){ log.textContent += m + '\n'; if(log.scrollTop > log.scrollHeight - 300) log.scrollTop = log.scrollHeight; }

class TestScene extends Phaser.Scene {
    constructor(){
        super({ key: 'Test' });
    }
    create(){
        L('=== TEST SCENE CREATE ===');
        this.cameras.main.setBackgroundColor(0x111111);

        // Create platform texture
        let g = this.add.graphics();
        g.fillStyle(0x4ecdc4, 1);
        g.fillRect(0, 0, 80, 16);
        g.generateTexture('plat', 80, 16);
        g.destroy();

        // Create player texture
        g = this.add.graphics();
        g.fillStyle(0xff6b6b, 1);
        g.fillRect(0, 0, 30, 36);
        g.generateTexture('ball', 30, 36);
        g.destroy();

        // Platform group
        const group = this.physics.add.group();

        // Platform 1: directly under where player will be
        const plat1 = this.add.sprite(GAME_W/2, 560, 'plat');
        this.physics.add.existing(plat1, true); // true = static
        group.add(plat1);
        L(`Platform1 sprite y=${plat1.y} body=${!!plat1.body}`);

        // Platform 2: above (should NOT cause jump)
        const plat2 = this.add.sprite(GAME_W/2, 300, 'plat');
        this.physics.add.existing(plat2, true);
        group.add(plat2);

        // Player
        const player = this.add.sprite(GAME_W/2, 510, 'ball');
        this.physics.add.existing(player);
        (player.body).setSize(30, 36);
        (player.body).setGravityY(1200);
        (player.body).setCollideWorldBounds(false);
        L(`Player sprite y=${player.y} body vel.y initial=${player.body.velocity.y}`);

        // COLLIDER
        this.physics.add.collider(player, group, (p, plat) => {
            const pb = p.body;
            const pvb = plat.body;
            L(`!! COLLISION CALLBACK !!`);
            L(`  player.y=${p.y.toFixed(1)} vel.y=${pb.velocity.y.toFixed(1)}`);
            L(`  touching.down=${pb.touching.down} blocked.down=${pb.blocked.down}`);
            L(`  plat.y=${plat.y} platBody.top=${pvb.top?.toFixed(0)}`);

            if ((pb.touching.down || pb.blocked.down) && pb.velocity.y > 0) {
                L(`  >> JUMP! setting velY=-520`);
                pb.velocity.y = -520;
            } else {
                L(`  >> NO JUMP: touching.down=${pb.touching.down} vel.y=${pb.velocity.y}`);
            }
        });
        L('Collider registered');

        // Periodic state dump
        this.time.addEvent({
            delay: 300,
            callback: () => {
                const b = player.body;
                L(`[FRAME] player.y=${player.y.toFixed(1)} vel.y=${b.velocity.y.toFixed(1)} | falling=${b.velocity.y>0}`);
            },
            loop: true
        });

        L('Waiting for player to fall and land...');
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    width: GAME_W,
    height: GAME_H,
    parent: 'c',
    backgroundColor: '#111',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: true }
    },
    scene: [TestScene]
});
</script>
</body>
</html>
